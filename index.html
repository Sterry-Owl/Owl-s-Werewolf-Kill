<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>點對點發牌系統 v1.2</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: #f4f4f9; color: #333; margin: 0; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; background: #fafafa; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin: 5px 2px; }
        button:hover { background: #0056b3; }
        input[type="text"], input[type="number"], input[type="file"] { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 500px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #eee; }
        .card-img-preview { max-width: 80px; max-height: 80px; display: block; border-radius: 4px; }
        .player-hand-img { max-width: 100%; max-height: 400px; border-radius: 8px; margin-top: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; color: white; background: #6c757d; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="main-title">點對點發牌系統 v1.2</h2>

    <div id="role-selection" class="section">
        <h3>請選擇登入身分</h3>
        <button onclick="showLibrarian()">圖書管理員 (建置牌庫)</button>
        <button onclick="showHost()">主持人 (建立房間與發牌)</button>
        <button onclick="showPlayerJoin()">一般玩家 (加入房間)</button>
    </div>

    <div id="librarian-section" class="section hidden">
        <h3>圖書管理員：建置全局牌庫</h3>
        <div style="background: #e9ecef; padding: 10px; border-radius: 5px;">
            <input type="text" id="lib-card-name" placeholder="卡牌名稱 (例：預言家)">
            <input type="text" id="lib-card-faction" placeholder="所屬陣營 (例：好人陣營)">
            <label style="display: block; margin-top: 10px; font-size: 14px;">上傳卡牌圖片 (建議 1MB 以下)</label>
            <input type="file" id="lib-card-img" accept="image/*">
            <button onclick="addCardToLibrary()" style="width: 100%; margin-top: 10px;">加入牌庫</button>
        </div>
        
        <div class="table-responsive">
            <table id="lib-table">
                <tr><th>名稱</th><th>陣營</th><th>圖片</th><th>操作</th></tr>
            </table>
        </div>
        <button onclick="exportLibrary()" style="margin-top: 20px; background: #28a745; width: 100%;">下載 / 匯出牌庫檔 (.json)</button>
    </div>

    <div id="host-setup-section" class="section hidden">
        <h3>主持人：載入牌庫與配置</h3>
        
        <div id="import-area">
            <p>尚未偵測到牌庫，請載入圖書管理員提供的 <code>.json</code> 檔案。</p>
            <input type="file" id="host-import-file" accept=".json" onchange="importLibrary(event)">
        </div>

        <div id="host-config-area" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h4 style="color: #28a745;">✅ 已載入裝置記憶體</h4>
                <button onclick="clearCachedLibrary()" style="background: #6c757d; font-size: 12px; padding: 5px 10px;">清除記憶並重新匯入</button>
            </div>
            
            <div class="table-responsive">
                <table id="host-config-table">
                    <tr><th>圖片</th><th>名稱 (陣營)</th><th>本局數量</th></tr>
                </table>
            </div>
            <p>本局總張數：<strong id="host-total-cards">0</strong></p>
            <button onclick="initHost()" style="width: 100%; background: #17a2b8;">確認配置並建立房間</button>
        </div>
    </div>

    <div id="host-dashboard" class="section hidden">
        <h3>房間資訊</h3>
        <p>房間代碼：<strong id="room-code-display" style="font-size: 28px; color: #d9534f; letter-spacing: 2px;">生成中...</strong></p>
        <hr>
        <h3>玩家列表與發牌控制</h3>
        <button onclick="dealCards()">開始發牌</button>
        <button onclick="resetGame()" style="background: #dc3545;">重置/收回卡牌</button>
        <div class="table-responsive">
            <table id="players-table">
                <tr><th>玩家暱稱</th><th>分配到的卡牌</th></tr>
            </table>
        </div>
    </div>

    <div id="player-join-section" class="section hidden">
        <h3>加入房間</h3>
        <input type="text" id="join-room-code" placeholder="請輸入房間代碼">
        <input type="text" id="join-player-name" placeholder="請輸入您的暱稱">
        <button onclick="initPlayer()" style="width: 100%;">連線</button>
        <div id="player-status" style="margin-top: 10px; color: #666;"></div>
    </div>

    <div id="player-hand-section" class="section hidden">
        <h3>您的手牌</h3>
        <div style="text-align: center; padding: 20px; background: #fff; border-radius: 8px; border: 2px dashed #ccc;">
            <p id="my-card-name" style="font-size: 24px; font-weight: bold; margin: 0;">等待發牌...</p>
            <span id="my-card-faction" class="badge hidden" style="margin-top: 10px;"></span>
            <img id="my-card-img" class="player-hand-img hidden" src="" alt="卡牌圖片">
        </div>
        
        <hr>
        <h4>本局牌庫配置 <span style="font-size: 12px; font-weight: normal; color: #666;">(全公開)</span></h4>
        <ul id="player-config-list" style="padding-left: 20px; color: #555;">
            <li>等待主持人同步配置...</li>
        </ul>
    </div>
</div>

<script>
    // 加入 Google 的 STUN 伺服器，幫助遠端網路穿透
    const peerConfig = {
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' },
                { url: 'stun:stun2.l.google.com:19302' }
            ]
        }
    };

    let peer = null;
    let connections = {}; 
    let players = []; 
    let library = []; 
    let roomConfig = []; 
    let fullDeck = []; 

    function getBase64(file) {
        return new Promise((resolve, reject) => {
            if (!file) return resolve(null);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    // ==================== 圖書管理員邏輯 ====================
    function showLibrarian() {
        document.getElementById('role-selection').classList.add('hidden');
        document.getElementById('librarian-section').classList.remove('hidden');
    }

    async function addCardToLibrary() {
        const name = document.getElementById('lib-card-name').value.trim();
        const faction = document.getElementById('lib-card-faction').value.trim();
        const file = document.getElementById('lib-card-img').files[0];

        if (!name) return alert('請輸入卡牌名稱');

        const base64Img = await getBase64(file);
        const card = { id: Date.now().toString(), name, faction, img: base64Img };
        
        library.push(card);
        document.getElementById('lib-card-name').value = '';
        document.getElementById('lib-card-faction').value = '';
        document.getElementById('lib-card-img').value = '';
        renderLibraryTable();
    }

    function removeCardFromLibrary(id) {
        library = library.filter(c => c.id !== id);
        renderLibraryTable();
    }

    function renderLibraryTable() {
        const table = document.getElementById('lib-table');
        table.innerHTML = '<tr><th>名稱</th><th>陣營</th><th>圖片</th><th>操作</th></tr>';
        library.forEach(card => {
            const imgTag = card.img ? `<img src="${card.img}" class="card-img-preview">` : '無';
            table.innerHTML += `<tr>
                <td>${card.name}</td>
                <td><span class="badge">${card.faction || '無'}</span></td>
                <td>${imgTag}</td>
                <td><button onclick="removeCardFromLibrary('${card.id}')" style="background:#dc3545; padding:5px 10px;">刪除</button></td>
            </tr>`;
        });
    }

    function exportLibrary() {
        if (library.length === 0) return alert('牌庫是空的！');
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(library));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "deck_library.json");
        document.body.appendChild(downloadAnchorNode); 
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    // ==================== 主持人邏輯 ====================
    function showHost() {
        document.getElementById('role-selection').classList.add('hidden');
        document.getElementById('host-setup-section').classList.remove('hidden');
        
        // 檢查瀏覽器是否已經記憶了牌庫
        const cachedLibrary = localStorage.getItem('saved_deck_library');
        if (cachedLibrary) {
            library = JSON.parse(cachedLibrary);
            setupRoomConfig();
        }
    }

    function importLibrary(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                library = JSON.parse(e.target.result);
                // 儲存到瀏覽器記憶體
                localStorage.setItem('saved_deck_library', JSON.stringify(library));
                setupRoomConfig();
            } catch (err) {
                alert('檔案格式錯誤！');
            }
        };
        reader.readAsText(file);
    }

    function clearCachedLibrary() {
        if(confirm('確定要清除這台裝置記憶的牌庫嗎？')) {
            localStorage.removeItem('saved_deck_library');
            library = [];
            document.getElementById('host-config-area').classList.add('hidden');
            document.getElementById('import-area').classList.remove('hidden');
            document.getElementById('host-import-file').value = '';
        }
    }

    function setupRoomConfig() {
        document.getElementById('import-area').classList.add('hidden');
        document.getElementById('host-config-area').classList.remove('hidden');
        roomConfig = library.map(card => ({ ...card, qty: 0 }));
        renderHostConfigTable();
    }

    function renderHostConfigTable() {
        const table = document.getElementById('host-config-table');
        table.innerHTML = '<tr><th>圖片</th><th>名稱 (陣營)</th><th>本局數量</th></tr>';
        let total = 0;
        roomConfig.forEach((card, index) => {
            total += card.qty;
            const imgTag = card.img ? `<img src="${card.img}" class="card-img-preview">` : '無';
            table.innerHTML += `<tr>
                <td>${imgTag}</td>
                <td>${card.name} <br><span class="badge">${card.faction || '無'}</span></td>
                <td><input type="number" min="0" value="${card.qty}" onchange="updateCardQty(${index}, this.value)"></td>
            </tr>`;
        });
        document.getElementById('host-total-cards').innerText = total;
    }

    function updateCardQty(index, value) {
        roomConfig[index].qty = parseInt(value) || 0;
        let total = roomConfig.reduce((sum, card) => sum + card.qty, 0);
        document.getElementById('host-total-cards').innerText = total;
    }

    function initHost() {
        const totalCards = roomConfig.reduce((sum, card) => sum + card.qty, 0);
        if (totalCards === 0) return alert('本局總張數不能為 0');

        document.getElementById('host-setup-section').classList.add('hidden');
        document.getElementById('host-dashboard').classList.remove('hidden');
        
        const roomCode = Math.floor(1000 + Math.random() * 9000).toString();
        const peerId = 'ROOM-' + roomCode;
        
        // 帶入 STUN 設定
        peer = new Peer(peerId, peerConfig);
        
        peer.on('open', (id) => {
            document.getElementById('room-code-display').innerText = roomCode;
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.type === 'JOIN') {
                    players.push({ id: conn.peer, name: data.name, card: null });
                    connections[conn.peer] = conn;
                    updateHostPlayerTable();
                    conn.send({ type: 'CONFIG', config: roomConfig });
                }
            });
            conn.on('close', () => {
                players = players.filter(p => p.id !== conn.peer);
                delete connections[conn.peer];
                updateHostPlayerTable();
            });
        });
    }

    function updateHostPlayerTable() {
        const table = document.getElementById('players-table');
        table.innerHTML = '<tr><th>玩家暱稱</th><th>分配到的卡牌</th></tr>';
        players.forEach(p => {
            const cardDisplay = p.card ? `${p.card.name} (${p.card.faction})` : '尚未分配';
            table.innerHTML += `<tr><td>${p.name}</td><td>${cardDisplay}</td></tr>`;
        });
    }

    function dealCards() {
        if (players.length === 0) return alert('沒有玩家加入房間');
        
        fullDeck = [];
        roomConfig.forEach(c => {
            for(let i=0; i<c.qty; i++) {
                fullDeck.push({ name: c.name, faction: c.faction, img: c.img });
            }
        });

        if (fullDeck.length < players.length) return alert('卡牌總數少於玩家人數，請確認配置！');

        for (let i = fullDeck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [fullDeck[i], fullDeck[j]] = [fullDeck[j], fullDeck[i]];
        }

        players.forEach(p => {
            const dealtCard = fullDeck.pop();
            p.card = dealtCard;
            if (connections[p.id]) {
                connections[p.id].send({ type: 'DEAL', card: dealtCard });
            }
        });
        updateHostPlayerTable();
    }

    function resetGame() {
        players.forEach(p => p.card = null);
        Object.values(connections).forEach(conn => {
            conn.send({ type: 'RESET' });
        });
        updateHostPlayerTable();
    }

    // ==================== 玩家邏輯 ====================
    function showPlayerJoin() {
        document.getElementById('role-selection').classList.add('hidden');
        document.getElementById('player-join-section').classList.remove('hidden');
    }

    function initPlayer() {
        const roomCode = document.getElementById('join-room-code').value.trim();
        const playerName = document.getElementById('join-player-name').value.trim();
        if (!roomCode || !playerName) return alert('請填寫完整資訊');

        const hostId = 'ROOM-' + roomCode;
        
        // 帶入 STUN 設定
        peer = new Peer(undefined, peerConfig);
        
        const statusDiv = document.getElementById('player-status');
        statusDiv.innerText = '正在尋找主機...';

        peer.on('open', (id) => {
            statusDiv.innerText = '建立安全連線中...';
            const conn = peer.connect(hostId, { reliable: true });
            
            conn.on('open', () => {
                document.getElementById('player-join-section').classList.add('hidden');
                document.getElementById('player-hand-section').classList.remove('hidden');
                conn.send({ type: 'JOIN', name: playerName });
            });

            conn.on('data', (data) => {
                if (data.type === 'CONFIG') {
                    const listEl = document.getElementById('player-config-list');
                    listEl.innerHTML = '';
                    let hasCards = false;
                    data.config.forEach(c => {
                        if (c.qty > 0) {
                            listEl.innerHTML += `<li><strong>${c.name}</strong> (${c.faction || '無'}) x ${c.qty} 張</li>`;
                            hasCards = true;
                        }
                    });
                    if (!hasCards) listEl.innerHTML = '<li>主持人尚未設定卡牌數量</li>';
                } 
                else if (data.type === 'DEAL') {
                    document.getElementById('my-card-name').innerText = data.card.name;
                    const factionEl = document.getElementById('my-card-faction');
                    if(data.card.faction) {
                        factionEl.innerText = data.card.faction;
                        factionEl.classList.remove('hidden');
                    } else {
                        factionEl.classList.add('hidden');
                    }

                    const imgEl = document.getElementById('my-card-img');
                    if (data.card.img) {
                        imgEl.src = data.card.img;
                        imgEl.classList.remove('hidden');
                    } else {
                        imgEl.classList.add('hidden');
                    }
                } 
                else if (data.type === 'RESET') {
                    document.getElementById('my-card-name').innerText = '等待發牌...';
                    document.getElementById('my-card-faction').classList.add('hidden');
                    document.getElementById('my-card-img').classList.add('hidden');
                }
            });
            
            conn.on('error', (err) => {
                statusDiv.innerText = '連線斷開，請重整網頁。';
            });
        });

        peer.on('error', (err) => {
            statusDiv.innerHTML = `<span style="color:red;">連線失敗。若您是不同網路環境，請改用 Netlify 網址開啟，勿直接點擊 html 檔案。</span>`;
        });
    }
</script>
</body>
</html>
