<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天黑請閉眼（鶯鶯製） v3.0 標準局</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #fff;">天黑請閉眼 v3.0 核心測試</h2>

    <div id="section-entry" class="section" style="text-align: center; max-width: 400px; margin: auto;">
        <h3 style="color: var(--accent-blue);">建立 / 加入房間</h3>
        <button id="btn-create-room" style="width: 100%; margin-bottom: 10px;">主持人 (建立房間)</button>
        <hr style="border-color: #444; margin: 20px 0;">
        <input type="text" id="input-room-id" placeholder="房間代碼 (4碼)" style="font-size: 16px; letter-spacing: 2px;">
        <input type="text" id="input-player-name" placeholder="您的暱稱" style="font-size: 16px;">
        <button id="btn-join-room" style="width: 100%; background: var(--accent-green);">一般玩家 (加入房間)</button>
    </div>

    <div id="section-host" class="section hidden">
        <h3 style="color: var(--accent-blue); display: flex; justify-content: space-between; align-items: center;">
            主控台 <span style="color: #fff; font-size: 16px;">房間代碼：<strong id="display-room-id" style="color: var(--accent-red); font-size: 32px;">...</strong></span>
        </h3>
        <hr style="border-color: var(--border-color); margin: 20px 0;">
        
        <h4 style="text-align: center; color: var(--text-muted);">本局玩家總覽</h4>
        <div id="host-players-grid"></div>

        <div id="host-setup-panel">
            <h4 style="text-align: center; color: var(--text-muted); margin-top: 30px;">步驟一：設定本局角色數量 (當前牌堆: <span id="deck-count-display" style="color: var(--accent-red); font-size: 20px;">0</span>)</h4>
            <div id="role-selection-grid" class="config-gallery"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button id="btn-start-game" style="background: var(--accent-blue); font-size: 18px; padding: 12px 24px;">確認配置並發牌</button>
            </div>
        </div>

        <div id="host-control-panel" class="hidden">
            <div class="host-layout">
                <div class="control-panel-container" style="width: 100%;">
                    <div id="host-status-log" class="system-log">等待系統狀態更新...</div>
                    <div id="host-night-panel" class="hidden" style="margin-top: 15px;">
                        <ul id="night-flow-list" class="flow-list"></ul>
                        <button id="btn-force-next" class="btn-secondary hidden" style="width: 100%; margin-top: 10px;">強制跳過本階段</button>
                    </div>
                    <div id="host-day-panel" class="hidden" style="margin-top: 15px;">
                        <button id="btn-host-action" style="width: 100%; font-size: 16px;">發起投票</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="section-player" class="section hidden">
        <h3 style="text-align: center; color: var(--text-muted);">
            你的座位: <span id="player-seat-number" style="color: white;">-</span>號
        </h3>
        <div id="player-role-display" class="hidden" style="text-align: center; font-size: 22px; color: var(--accent-red); margin-bottom: 20px; font-weight: bold;">
            身分: <span id="player-role-name"></span>
        </div>

        <div id="player-config-display" style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 15px; padding: 10px; background: #222; border-radius: 8px; border: 1px solid var(--border-color);">
            <span style="color: var(--text-muted); font-size: 14px; width: 100%; text-align: center;">本局配置 (等待同步...)</span>
        </div>

        <div style="position: relative; width: 450px; height: 450px; margin: 20px auto;">
            <div id="player-targets-grid" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
            <div id="player-center-card" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; text-align: center; z-index: 10;">
                <h3 style="color: var(--text-muted); margin: 0 0 5px 0; font-size: 14px;">等待發牌...</h3>
                <img id="my-card-img" class="hidden" src="" style="width: 100%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.6);">
            </div>
        </div>

        <div id="player-status-message" class="status-message" style="margin-top: 20px;">等待遊戲開始...</div>

        <div id="player-action-panel" class="action-panel hidden">
            <h4 id="action-prompt" style="color: var(--accent-blue); margin-top: 0;">請選擇目標</h4>
            <div id="special-options-container" class="special-options hidden"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                <button id="btn-confirm-action" class="btn-primary" disabled>確認</button>
                <button id="btn-pass-action" class="btn-secondary hidden">跳過</button>
            </div>
        </div>
    </div>
</div>

<script src="./js/config.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/player.js"></script>
<script src="./js/host.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
