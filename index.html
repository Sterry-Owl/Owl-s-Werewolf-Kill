<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天黑請閉眼 α1.1.0</title>
    <link rel="icon" href="favicon.ico?v=1.0" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container">
        
        <!-- ============================================== -->
        <!-- 區塊一：登入/建立房間介面 (Entry) -->
        <!-- ============================================== -->
        <div id="section-entry">
            <h2>破霧</h2>
            
            <div class="section">
                <h3>建立遊戲（法官）</h3>
                <!-- [擴充] HTML5 原生防呆限制 -->
                <input type="text" id="input-host-room-id" inputmode="numeric" pattern="\d{4}" maxlength="4" placeholder="輸入4位數房號（空白則隨機生成）">
                <button id="btn-create-room">建立房間</button>
            </div>
            
            <div class="section">
                <h3>加入遊戲（玩家）</h3>
                <input type="text" id="input-room-id" placeholder="請輸入房間代碼 (例如: 1234)">
                <input type="text" id="input-player-name" placeholder="請輸入你的暱稱">
                <button id="btn-join-room" class="btn-success">加入房間</button>
            </div>
        </div>

        <!-- ============================================== -->
        <!-- 區塊二：主機端介面 (Host) -->
        <!-- ============================================== -->
        <div id="section-host" class="hidden">
            <h2>主控台 (房間：<span id="display-room-id" style="color: var(--accent-red);"></span>)</h2>
            <div id="host-status-log" class="system-log">等待遊戲開始...</div>
            
           <div id="host-setup-panel" class="section">
                
                <!-- 雙欄佈局容器開始 -->
                <div class="setup-layout">
                    
                    <!-- ================= 左欄：版型選擇 ================= -->
                    <div class="setup-left">
                        <h3 style="margin-bottom: 10px;">選擇遊戲版型</h3>
                        <div class="toggle-group" id="template-category-tabs" style="margin-bottom: 12px;">
                            <div class="toggle-option active" data-category="standard" style="--active-bg: #588da8; --active-color: #fff;">標準場</div>
                            <div class="toggle-option" data-category="quick" style="--active-bg: #a358a8; --active-color: #fff;">快速場</div>
                            <div class="toggle-option" data-category="fun" style="--active-bg: #6da858; --active-color: #fff;">娛樂場</div>
                            <div class="toggle-option" data-category="test" style="--active-bg: #a88058; --active-color: #fff;">測試場</div>
                        </div>
                        <div id="board-template-container" class="template-grid"></div>
                        <input type="hidden" id="select-board-template" value="">

                        <div id="template-deck-preview" style="margin-bottom: 20px; font-size: 14px; color: #aaa;"></div>
                    </div>
                    
                    <!-- ================= 右欄：規則設定 ================= -->
                    <div class="setup-right">
                        <h3 style="margin-bottom: 15px; font-size: 16px; color: #fff;">遊戲規則設定</h3>

                        <!-- 規則一：女巫自救 -->
                        <label>女巫自救：</label>
                        <div class="toggle-group" data-target="rule-witch-save">
                            <div class="toggle-option active" data-value="never" style="--active-bg: #96a164; --active-color: #000;">全程不可自救</div>
                            <div class="toggle-option" data-value="first_night" style="--active-bg: #69424e; --active-color: #000;">僅首夜可以自救</div>
                        </div>
                        <input type="hidden" id="rule-witch-save" value="never">
                        <!-- 規則二：勝利條件 -->
                        <label>勝利條件：</label>
                        <div class="toggle-group" data-target="rule-win-condition">
                            <div class="toggle-option active" data-value="kill_side" style="--active-bg: #96a164; --active-color: #000;">屠邊 (神職全滅 或 平民全滅)</div>
                            <div class="toggle-option" data-value="kill_all" style="--active-bg: #69424e; --active-color: #000;">屠城 (好人陣營全滅)</div>
                        </div>
                        <input type="hidden" id="rule-win-condition" value="kill_side">

                        <!-- 規則三：放逐平票處置 -->
                        <label>放逐平票處置：</label>
                        <div class="toggle-group" data-target="rule-tie-resolution">
                            <div class="toggle-option active" data-value="pk" style="--active-bg: #96a164; --active-color: #000;">PK 發言與投票</div>
                            <div class="toggle-option" data-value="peace" style="--active-bg: #69424e; --active-color: #000;">平票無人出局</div>
                        </div>
                        <input type="hidden" id="rule-tie-resolution" value="pk">

                        <!-- 規則四：警長機制 -->
                        <label>警長機制：</label>
                        <div class="toggle-group" data-target="rule-sheriff">
                            <div class="toggle-option active" data-value="enabled" style="--active-bg: #96a164; --active-color: #000;">開啟警長 (首日競選)</div>
                            <div class="toggle-option" data-value="disabled" style="--active-bg: #69424e; --active-color: #000;">關閉警長</div>
                        </div>
                        <input type="hidden" id="rule-sheriff" value="enabled">

                        <!-- 規則 4-1：警長自爆 -->
                        <label>警長競選自爆：</label>
                        <div class="toggle-group" data-target="rule-sheriff-explode">
                            <div class="toggle-option active" data-value="double" style="--active-bg: #96a164; --active-color: #000;">雙爆吞警徽</div>
                            <div class="toggle-option" data-value="single" style="--active-bg: #69424e; --active-color: #000;">單爆吞警徽</div>
                        </div>
                        <input type="hidden" id="rule-sheriff-explode" value="double">
                        
                        <!-- 規則五：出局身分揭曉 -->
                        <label>出局身分揭曉：</label>
                        <div class="toggle-group" data-target="rule-death-reveal">
                            <div class="toggle-option active" data-value="dark" style="--active-bg: #96a164; --active-color: #000;">暗牌 (不揭曉)</div>
                            <div class="toggle-option" data-value="light" style="--active-bg: #69424e; --active-color: #000;">明牌 (揭曉身分)</div>
                        </div>
                        <input type="hidden" id="rule-death-reveal" value="dark">
                    </div>
                    
                </div>
                <!-- 雙欄佈局容器結束 -->

                <!-- 滿版寬度的確認按鈕 -->
                <button id="btn-start-game" class="btn-success" style="width: 100%; margin-top: 20px;">確認配置並發牌</button>
            </div>
            <!-- ============================================== -->
            <!-- 新版主控台介面 (ver α.1.0.0 沉浸式監控) -->
            <!-- ============================================== -->
            <div id="host-control-panel" class="hidden">
                <div class="player-app-container" style="max-width: 450px; border-color: var(--accent-blue);">
                    <div class="app-header" style="background: #1c2a4a; border-bottom: 2px solid #0b152a;">
                        <div>主控台 (房號：<span id="display-room-id-in-game"></span>)</div>
                        <div id="host-phase-name" style="color: var(--sheriff-gold);"></div>
                    </div>
                    
                    <div class="app-body">
                        <!-- 左側座位區 -->
                        <div id="host-left-seats" class="seat-column"></div>
                        
                        <!-- 中間控制與紀錄區 -->
                        <div class="center-column" style="pointer-events: auto; justify-content: flex-start; gap: 10px; padding: 10px 0;">
                            
                            <!-- 狀態與操作面板 -->
                            <div class="action-panel" style="min-height: auto; width: 95%; padding: 12px 10px;">
                                <div id="host-status-log" class="action-prompt" style="margin-bottom: 12px; font-size: 13px;"></div>
                                <button id="btn-host-action" class="btn-primary" style="width: 100%; padding: 10px;"></button>
                                <button id="btn-force-next" class="btn-secondary hidden" style="width: 100%; padding: 10px; margin-top: 6px;">強制跳過</button>
                            </div>
                            
                            <!-- 夜間行動面板 (僅夜晚顯示) -->
                            <div id="host-night-panel" class="action-panel hidden" style="min-height: auto; width: 95%; padding: 10px; max-height: 180px; overflow-y: auto; justify-content: flex-start; background: #2b3a42;">
                                <div style="color: #a8e8e2; font-size: 12px; font-weight: bold; margin-bottom: 6px;">【夜間行動進度】</div>
                                <ul id="night-flow-list" class="flow-list" style="margin:0; width: 100%;"></ul>
                            </div>

                            <!-- 全知上帝視角紀錄 -->
                            <div id="host-master-log-panel" class="vote-history-panel" style="flex: 1; width: 95%; padding: 10px; display: flex; flex-direction: column; background: rgba(0,0,0,0.8); border-color: var(--accent-blue);">
                                <div style="color: #fff; font-size: 13px; font-weight: bold; margin-bottom: 6px; text-align: center; border-bottom: 1px solid #555; padding-bottom: 6px; flex-shrink: 0;">全知視角紀錄</div>
                                <div id="host-master-log-content" style="flex: 1; overflow-y: auto; font-size: 12px; color: #ddd; line-height: 1.5; text-align: left;"></div>
                            </div>
                        </div>
                        
                        <!-- 右側座位區 -->
                        <div id="host-right-seats" class="seat-column"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============================================== -->
        <!-- 區塊三：玩家端介面 (Player UI) -->
        <!-- ============================================== -->
        <div id="section-player" class="hidden">
            <div class="player-app-container">
                
                <div class="app-header">
                    <div>座位：<span id="player-seat-number"></span> 號</div>
                    <!-- UI.js 會在這邊動態插入 <div id="dynamic-board-name"> -->
                    <div>身分：<span id="player-role-name"></span></div>
                </div>
                
                <div class="app-body">
                    <div id="left-seats" class="seat-column"></div>
                    
                    <div class="center-column">
                        <div id="dynamic-action-panel" class="action-panel">
                            <div id="target-slots-container" class="target-slots-container hidden"></div>
                            
                            <div id="action-prompt" class="action-prompt"></div>
                            <div id="dynamic-buttons-container" class="action-buttons-row"></div>
                        </div>
                    </div>
                    
                    <div id="right-seats" class="seat-column"></div>
                    
                    <div class="card-panel">
                        <!-- 3D 翻轉容器 -->
                        <div id="my-card-container" class="card-container hidden" style="cursor: pointer;">
                            <div id="my-card-flipper" class="card-flipper">
                                <!-- 正面：卡面圖 -->
                                <div class="card-front">
                                    <img id="my-card-img" class="my-card" src="">
                                </div>
                                <!-- 背面：技能說明 -->
                                <div class="card-back my-card">
                                    <div class="role-desc-title" id="role-desc-title"></div>
                                    <div class="role-desc-content" id="role-desc-content"></div>
                                </div>
                            </div>
                        </div>
                        <div id="vote-history-panel" class="vote-history-panel hidden"></div>
                    </div>
                </div>
                
                <button id="btn-self-explode" class="floating-btn red hidden"></button>
                <button id="btn-wolf-chat" class="floating-btn purple hidden" style="background-image: url('./img/btn-chat.webp');"></button>
                <button id="btn-day-skill" class="floating-btn hidden" style="left: 15px;"></button>
                <button id="btn-bailout" class="floating-btn blue hidden"></button> 
                <button id="btn-vote-history" class="floating-btn yellow hidden"></button>
                <div id="local-day-skill-panel" class="action-panel hidden" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.9);">
                    <div id="local-day-skill-prompt" class="action-prompt">請選擇目標：</div>
                    <div id="local-day-skill-targets" class="action-buttons-row" style="margin-top: 15px; margin-bottom: 15px; max-height: 200px; overflow-y: auto;"></div>
                    <button id="btn-cancel-day-skill" class="btn-secondary" style="width: 100%;">取消</button>
                </div>
                <div id="wolf-chat-modal" class="modal hidden" style="display: none; position: absolute; top: 55px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 400px; background: #222; border: 2px solid #555; border-radius: 8px; padding: 15px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <h3 style="margin: 0; color: #fff;">狼人夜間溝通</h3>
                        <span id="close-wolf-chat-btn" style="color: #aaa; font-size: 24px; cursor: pointer;">&times;</span>
                    </div>
                    <div id="wolf-chat-logs" style="height: 200px; overflow-y: auto; background: #111; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-family: monospace;"></div>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="wolf-chat-input" placeholder="午夜階段可發送訊息..." style="flex: 1; padding: 8px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px;" />
                        <button id="btn-wolf-chat-send" class="btn-primary" style="padding: 8px 15px;">發送</button>
                    </div>
                    <div id="wolf-chat-lock-notice" style="color: #ff4d4d; font-size: 12px; margin-top: 5px; display: none;">⚠️ 目前非午夜階段，僅供讀取歷史紀錄。</div>
                </div>
            </div>
        </div> <!-- 關閉 section-player -->
    </div> <!-- 關閉 container -->
    
    <script src="js/config.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/role.js"></script>
    <script src="js/phases.js"></script>
    <script src="js/host.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
