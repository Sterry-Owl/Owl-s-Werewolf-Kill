<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天黑請閉眼 v3.10.1</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container">
        
        <!-- ============================================== -->
        <!-- 區塊一：登入/建立房間介面 (Entry) -->
        <!-- ============================================== -->
        <div id="section-entry">
            <h2>天黑請閉眼 - WebRTC 法官系統</h2>
            
            <div class="section">
                <h3>建立遊戲 (我是法官/主機)</h3>
                <button id="btn-create-room">建立房間</button>
            </div>
            
            <div class="section">
                <h3>加入遊戲 (我是玩家)</h3>
                <input type="text" id="input-room-id" placeholder="請輸入房間代碼 (例如: 1234)">
                <input type="text" id="input-player-name" placeholder="請輸入你的暱稱">
                <button id="btn-join-room" class="btn-success">加入房間</button>
            </div>
        </div>

        <!-- ============================================== -->
        <!-- 區塊二：主機端介面 (Host) -->
        <!-- ============================================== -->
        <div id="section-host" class="hidden">
            <h2>主控台 (房間：<span id="display-room-id" style="color: var(--accent-red);"></span>)</h2>
            <div id="host-status-log" class="system-log">等待遊戲開始...</div>
            
            <div id="host-setup-panel" class="section">
                <h3>選擇遊戲版型</h3>
                <select id="select-board-template"></select>
                <p id="template-deck-preview" style="font-size: 14px; color: #aaa;"></p>
                
                <h3 style="margin-top:20px; border-bottom: 1px solid #444; padding-bottom: 10px;">遊戲規則設定</h3>
                <div style="margin-bottom: 10px;">
                    <label>女巫自救：</label>
                    <select id="rule-witch-save">
                        <option value="first_night">僅首夜可以自救</option>
                        <option value="always">每晚皆可自救</option>
                        <option value="never">全程不可自救</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 10px;">
                    <label>勝利條件：</label>
                    <select id="rule-win-condition">
                        <option value="kill_side">屠邊 (神職全滅 或 平民全滅)</option>
                        <option value="kill_all">屠城 (好人陣營全滅)</option>
                    </select>
                </div>
                
                <div style="margin-bottom: 10px;">
                    <label>放逐平票處置：</label>
                    <select id="rule-tie-resolution">
                        <option value="pk">PK 發言與投票</option>
                        <option value="peace">直接平安日 (無人出局)</option>
                    </select>
                </div>

                <!-- [新增] 警長機制設定 -->
                <div style="margin-bottom: 20px;">
                    <label>警長機制：</label>
                    <select id="rule-sheriff">
                        <option value="enabled">開啟警長 (首日競選)</option>
                        <option value="disabled">無警長</option>
                    </select>
                </div>

                <button id="btn-start-game" class="btn-success" style="width:100%; padding: 15px; font-size: 16px;">確認配置並發牌</button>
            </div>

            <div id="host-control-panel" class="hidden">
                <div id="host-night-panel" class="section hidden">
                    <h3>夜間行動進度</h3>
                    <ul id="night-flow-list" class="flow-list"></ul>
                    <button id="btn-force-next" class="btn-primary" style="margin-top: 10px;">強制跳過本階段</button>
                </div>
                
                <div id="host-day-panel" class="section hidden">
                    <h3>白天控制台</h3>
                    <button id="btn-host-action" style="width:100%; padding: 15px; font-size: 16px;"></button>
                </div>
                
                <h3>玩家狀態總覽</h3>
                <div id="host-players-grid" class="host-grid"></div>
            </div>
        </div>

        <!-- ============================================== -->
        <!-- 區塊三：玩家端介面 (Player UI) -->
        <!-- ============================================== -->
        <div id="section-player" class="hidden">
            <div class="player-app-container">
                
                <div class="app-header">
                    <div>座位：<span id="player-seat-number"></span> 號</div>
                    <!-- UI.js 會在這邊動態插入 <div id="dynamic-board-name"> -->
                    <div>身分：<span id="player-role-name"></span></div>
                </div>
                
                <div class="app-body">
                    <div id="left-seats" class="seat-column"></div>
                    
                    <div class="center-column">
                        <div id="dynamic-action-panel" class="action-panel">
                            <div id="target-preview-circle" class="target-preview hidden">
                                <img id="target-preview-img" src="">
                                <div id="target-preview-label"></div>
                            </div>
                            <div id="action-prompt" class="action-prompt"></div>
                            <div id="dynamic-buttons-container" class="action-buttons-row"></div>
                        </div>
                    </div>
                    
                    <div id="right-seats" class="seat-column"></div>
                    
                    <div class="card-panel">
                        <img id="my-card-img" class="my-card hidden" src="">
                        <div id="vote-history-panel" class="vote-history-panel hidden"></div>
                    </div>
                </div>
                
                <!-- 浮動按鈕 -->
                <button id="btn-self-explode" class="floating-btn red hidden"></button>
                <button id="btn-bailout" class="floating-btn blue hidden"></button> <!-- [新增] 藍色退水按鈕 -->
                <button id="btn-vote-history" class="floating-btn yellow hidden"></button>

            </div>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/role.js"></script>
    <script src="js/phases.js"></script>
    <script src="js/host.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
