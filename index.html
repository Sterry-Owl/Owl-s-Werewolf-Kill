<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天黑請閉眼 v3.15.2</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="container">
        
        <!-- ============================================== -->
        <!-- 區塊一：登入/建立房間介面 (Entry) -->
        <!-- ============================================== -->
        <div id="section-entry">
            <h2>天黑請閉眼 - WebRTC 法官系統</h2>
            
            <div class="section">
                <h3>建立遊戲 (我是法官/主機)</h3>
                <button id="btn-create-room">建立房間</button>
            </div>
            
            <div class="section">
                <h3>加入遊戲 (我是玩家)</h3>
                <input type="text" id="input-room-id" placeholder="請輸入房間代碼 (例如: 1234)">
                <input type="text" id="input-player-name" placeholder="請輸入你的暱稱">
                <button id="btn-join-room" class="btn-success">加入房間</button>
            </div>
        </div>

        <!-- ============================================== -->
        <!-- 區塊二：主機端介面 (Host) -->
        <!-- ============================================== -->
        <div id="section-host" class="hidden">
            <h2>主控台 (房間：<span id="display-room-id" style="color: var(--accent-red);"></span>)</h2>
            <div id="host-status-log" class="system-log">等待遊戲開始...</div>
            
            <div id="host-setup-panel" class="section">
        <!-- 版型選擇 -->
        <h3 style="margin-bottom: 10px;">選擇遊戲版型</h3>
        <div class="toggle-group" id="template-category-tabs" style="margin-bottom: 12px;">
            <div class="toggle-option active" data-category="test" style="--active-bg: #a88058; --active-color: #fff;">測試場</div>
            <div class="toggle-option active" data-category="quick" style="--active-bg: #a358a8; --active-color: #fff;">快速場</div>
            <div class="toggle-option" data-category="fun" style="--active-bg: #6da858; --active-color: #fff;">娛樂場</div>
            <div class="toggle-option" data-category="standard" style="--active-bg: #588da8; --active-color: #fff;">標準場</div>
        </div>
        <div id="board-template-container" class="template-grid"></div>
        <input type="hidden" id="select-board-template" value="">

        <div id="template-deck-preview" style="margin-bottom: 20px; font-size: 14px; color: #aaa;"></div>

        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">
        <h3 style="margin-bottom: 15px; font-size: 16px; color: #fff;">遊戲規則設定</h3>

        <!-- 規則一：女巫自救 -->
        <label>女巫自救：</label>
        <div class="toggle-group" data-target="rule-witch-save">
            <div class="toggle-option active" data-value="first_night" style="--active-bg: #96a164; --active-color: #000;">僅首夜可以自救</div>
            <div class="toggle-option" data-value="never" style="--active-bg: #69424e; --active-color: #000;">全程不可自救</div>
        </div>
        <input type="hidden" id="rule-witch-save" value="first_night">

        <!-- 規則二：勝利條件 -->
        <label>勝利條件：</label>
        <div class="toggle-group" data-target="rule-win-condition">
            <div class="toggle-option active" data-value="kill_side" style="--active-bg: #96a164; --active-color: #000;">屠邊 (神職全滅 或 平民全滅)</div>
            <div class="toggle-option" data-value="kill_all" style="--active-bg: #69424e; --active-color: #000;">屠城 (好人陣營全滅)</div>
        </div>
        <input type="hidden" id="rule-win-condition" value="kill_side">

        <!-- 規則三：放逐平票處置 -->
        <label>放逐平票處置：</label>
        <div class="toggle-group" data-target="rule-tie-resolution">
            <div class="toggle-option active" data-value="pk" style="--active-bg: #96a164; --active-color: #000;">PK 發言與投票</div>
            <div class="toggle-option" data-value="peace" style="--active-bg: #69424e; --active-color: #000;">平票無人出局</div>
        </div>
        <input type="hidden" id="rule-tie-resolution" value="pk">

        <!-- 規則四：警長機制 -->
        <label>警長機制：</label>
        <div class="toggle-group" data-target="rule-sheriff">
            <div class="toggle-option active" data-value="enabled" style="--active-bg: #96a164; --active-color: #000;">開啟警長 (首日競選)</div>
            <div class="toggle-option" data-value="disabled" style="--active-bg: #69424e; --active-color: #000;">關閉警長</div>
        </div>
        <input type="hidden" id="rule-sheriff" value="enabled">

        <button id="btn-start-game" class="btn-success" style="width: 100%; margin-top: 10px;">確認配置並發牌</button>
    </div>
            <div id="host-control-panel" class="hidden">
                <div id="host-night-panel" class="section hidden">
                    <h3>夜間行動進度</h3>
                    <ul id="night-flow-list" class="flow-list"></ul>
                    <button id="btn-force-next" class="btn-primary" style="margin-top: 10px;">強制跳過本階段</button>
                </div>
                
                <div id="host-day-panel" class="section hidden">
                    <h3>白天控制台</h3>
                    <button id="btn-host-action" style="width:100%; padding: 15px; font-size: 16px;"></button>
                </div>
                
                <h3>玩家狀態總覽</h3>
                <div id="host-players-grid" class="host-grid"></div>
            </div>
        </div>

        <!-- ============================================== -->
        <!-- 區塊三：玩家端介面 (Player UI) -->
        <!-- ============================================== -->
        <div id="section-player" class="hidden">
            <div class="player-app-container">
                
                <div class="app-header">
                    <div>座位：<span id="player-seat-number"></span> 號</div>
                    <!-- UI.js 會在這邊動態插入 <div id="dynamic-board-name"> -->
                    <div>身分：<span id="player-role-name"></span></div>
                </div>
                
                <div class="app-body">
                    <div id="left-seats" class="seat-column"></div>
                    
                    <div class="center-column">
                        <div id="dynamic-action-panel" class="action-panel">
                            <div id="target-preview-circle" class="target-preview hidden">
                                <img id="target-preview-img" src="">
                                <div id="target-preview-label"></div>
                            </div>
                            <div id="action-prompt" class="action-prompt"></div>
                            <div id="dynamic-buttons-container" class="action-buttons-row"></div>
                        </div>
                    </div>
                    
                    <div id="right-seats" class="seat-column"></div>
                    
                    <div class="card-panel">
                        <img id="my-card-img" class="my-card hidden" src="">
                        <div id="vote-history-panel" class="vote-history-panel hidden"></div>
                    </div>
                </div>
                
                <button id="btn-self-explode" class="floating-btn red hidden"></button>
                <button id="btn-day-skill" class="floating-btn hidden" style="left: 15px;"></button>
                <button id="btn-bailout" class="floating-btn blue hidden"></button> 
                <button id="btn-vote-history" class="floating-btn yellow hidden"></button>
                <div id="local-day-skill-panel" class="action-panel hidden" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.9);">
                    <div id="local-day-skill-prompt" class="action-prompt">請選擇目標：</div>
                    <div id="local-day-skill-targets" class="action-buttons-row" style="margin-top: 15px; margin-bottom: 15px; max-height: 200px; overflow-y: auto;"></div>
                    <button id="btn-cancel-day-skill" class="btn-secondary" style="width: 100%;">取消</button>
                </div>

            </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/role.js"></script>
    <script src="js/phases.js"></script>
    <script src="js/host.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/player.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
