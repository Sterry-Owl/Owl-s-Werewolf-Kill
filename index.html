<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天黑請閉眼 v3.6.12</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #fff; margin-bottom: 20px;">天黑請閉眼</h2>

    <div id="section-entry" class="section" style="max-width: 400px; margin: auto; text-align: center;">
        <h3 style="color: var(--accent-blue);">建立 / 加入房間</h3>
        <button id="btn-create-room" style="width: 100%; margin-bottom: 15px;">主持人 (建立房間)</button>
        <hr style="border-color: #444; margin: 20px 0;">
        <input type="text" id="input-room-id" placeholder="房間代碼 (4碼)" style="font-size: 16px; letter-spacing: 2px;">
        <input type="text" id="input-player-name" placeholder="您的暱稱" style="font-size: 16px;">
        <button id="btn-join-room" style="width: 100%; background: var(--accent-green);">一般玩家 (加入房間)</button>
    </div>

    <div id="section-host" class="section hidden">
        <h3 style="color: var(--accent-blue); display: flex; justify-content: space-between; align-items: center; margin-top: 0;">
            主控台 <span style="color: #fff; font-size: 16px;">房間：<strong id="display-room-id" style="color: var(--accent-red); font-size: 28px;">...</strong></span>
        </h3>
        
        <div id="host-players-grid" class="host-grid" style="margin-bottom: 20px;"></div>

        <div id="host-setup-panel" style="background: #222; padding: 20px; border-radius: 8px;">
            <h4 style="margin-top: 0; color: var(--text-muted);">選擇遊戲版型</h4>
            <select id="select-board-template" style="font-size: 16px; margin-bottom: 15px;"></select>
            <div id="template-deck-preview" style="color: #ccc; font-size: 14px; margin-bottom: 20px; min-height: 40px;"></div>
            <button id="btn-start-game" style="background: var(--accent-green); width: 100%; font-size: 16px; padding: 12px;">確認配置並發牌</button>
        </div>

        <div id="host-control-panel" class="hidden">
            <div id="host-status-log" class="system-log">等待系統狀態更新...</div>
            <div id="host-night-panel" class="hidden" style="margin-bottom: 15px;">
                <ul id="night-flow-list" class="flow-list"></ul>
                <button id="btn-force-next" class="btn-secondary hidden" style="width: 100%; margin-top: 10px;">強制跳過本階段</button>
            </div>
            <div id="host-day-panel" class="hidden">
                <button id="btn-host-action" style="width: 100%; font-size: 16px; padding: 12px;"></button>
            </div>
        </div>
    </div>

    <div id="section-player" class="hidden" style="padding: 0; background: transparent; border: none; margin: 0;">
        <div class="player-app-container">
            
            <div class="app-header">
                <span>座位：<span id="player-seat-number" style="color: white;">-</span> 號</span>
                <span>身分：<span id="player-role-name" style="color: #ffcccc;">-</span></span>
            </div>

            <div id="btn-self-explode" class="floating-btn red hidden">爆</div>
            <div id="btn-vote-history" class="floating-btn yellow hidden">票</div>

            <div class="app-body">
                <div id="left-seats" class="seat-column"></div>
                
                <div class="center-column">
                    <div id="player-action-panel" class="action-panel">
                        <div id="target-preview-circle" class="target-preview hidden">
                            <img id="target-preview-img" src="">
                            <div id="target-preview-label" class="hidden"></div>
                        </div>
                        <div id="action-prompt" class="action-prompt">等待遊戲開始...</div>
                        <div id="dynamic-buttons-container" class="action-buttons-row"></div>
                    </div>

                    <div class="card-panel">
                        <img id="my-card-img" class="my-card hidden" src="" onerror="this.style.display='none'">
                        <div id="vote-history-panel" class="vote-history-panel hidden"></div>
                    </div>
                </div>

                <div id="right-seats" class="seat-column"></div>
            </div>

        </div>
    </div>
</div>

<script src="./js/config.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/player.js"></script>
<script src="./js/host.js"></script>
<script src="./js/app.js"></script> 

</body>
</html>
