<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天黑請閉眼 - 數位狼人殺系統 v2.3</title>
    <!-- 引入外部樣式表 -->
    <link rel="stylesheet" href="css/style.css">
    <!-- 引入 PeerJS 用於 P2P 連線 -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="app-container">
        <!-- ========================================== -->
        <!-- 1. 登入與連線畫面 (Login & Connection)      -->
        <!-- ========================================== -->
        <section id="login-screen" class="screen active">
            <h1>狼人殺 v2.3</h1>
            <div class="login-box">
                <button id="btn-create-room">創建房間 (主持人)</button>
                <div class="divider">或</div>
                <input type="text" id="input-room-id" placeholder="請輸入房間號碼" autocomplete="off">
                <input type="text" id="input-player-name" placeholder="請輸入玩家暱稱" autocomplete="off">
                <button id="btn-join-room">加入房間 (玩家)</button>
            </div>
            <div id="login-status"></div>
        </section>

        <!-- ========================================== -->
        <!-- 2. 主持人主控台 (Host Dashboard)            -->
        <!-- ========================================== -->
        <section id="host-screen" class="screen hidden">
            <header class="host-header">
                <h2>主持人控制台</h2>
                <div class="room-info">房間號碼: <span id="display-room-id"></span></div>
            </header>

            <div class="host-layout">
                <!-- 左側：全場玩家狀態圓桌 -->
                <div class="main-table-container">
                    <h3>玩家狀態總覽</h3>
                    <div id="host-players-grid" class="players-grid"></div>
                </div>

                <!-- 右側：階段控制與流程面板 -->
                <div class="control-panel-container">
                    <!-- 白天控制面板 (Day Phase Dashboard) -->
                    <div id="day-dashboard" class="phase-dashboard hidden">
                        <h3>白天階段控制</h3>
                        <div class="action-buttons">
                            <button id="btn-start-vote">發起暗投</button>
                            <button id="btn-interrupt-skill">觸發插隊技能</button>
                            <button id="btn-end-day" class="btn-primary">結束白天 (進入黑夜)</button>
                        </div>
                        <div id="vote-results-container" class="system-log">
                            <!-- 投票結果將渲染於此 -->
                        </div>
                    </div>

                    <!-- 夜晚控制面板 (Night Phase Dashboard) -->
                    <div id="night-dashboard" class="phase-dashboard hidden">
                        <h3>夜晚流程圖</h3>
                        <div class="action-buttons">
                            <button id="btn-start-night" class="btn-primary">開始夜晚結算</button>
                            <button id="btn-end-night" class="hidden btn-primary">天亮結算</button>
                        </div>
                        <ul id="night-flow-list" class="flow-list">
                            <!-- 動態渲染的睜眼順序將插入於此 -->
                        </ul>
                    </div>
                </div>
            </div>
        </section>

        <!-- ========================================== -->
        <!-- 3. 玩家操作介面 (Player Interface)           -->
        <!-- ========================================== -->
        <section id="player-screen" class="screen hidden">
            <header class="player-header">
                <h2>你的座位號碼: <span id="player-seat-number">-</span></h2>
                <div class="role-reveal hidden" id="player-role-display">
                    你的身分是: <span id="player-role-name"></span>
                </div>
            </header>

            <!-- 狼人專屬：常駐自爆按鈕 -->
            <button id="btn-self-destruct" class="btn-danger hidden">我要自爆</button>

            <!-- 狀態提示區 -->
            <div id="player-status-message" class="status-message">等待遊戲開始...</div>

            <!-- 夜晚技能目標選擇圓桌 -->
            <div id="player-action-panel" class="action-panel hidden">
                <h3 id="action-prompt">請選擇目標</h3>
                
                <!-- 針對奇蹟商人與盜賊的特殊複合按鈕區 -->
                <div id="special-options-container" class="special-options hidden">
                    <!-- 系統動態生成卡牌或技能選項 -->
                </div>

                <div id="player-targets-grid" class="players-grid">
                    <!-- 號碼按鈕將渲染於此 -->
                </div>
                
                <div class="action-confirm">
                    <button id="btn-confirm-action" class="btn-primary" disabled>確認行動</button>
                    <button id="btn-cancel-action" class="btn-secondary hidden">取消</button>
                </div>
            </div>

            <!-- 白天暗投面板 (Secret Voting Panel) -->
            <div id="player-voting-panel" class="voting-panel hidden">
                <h3>請進行放逐投票</h3>
                <div id="voting-targets-grid" class="players-grid">
                    <!-- 可投票的號碼將渲染於此 -->
                </div>
                <button id="btn-abstain-vote" class="btn-secondary">棄票</button>
            </div>
        </section>
    </div>

    <!-- 引入系統邏輯腳本 (依照相依性順序排列) -->
    <script src="js/config.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/player.js"></script>
    <script src="js/host.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // ==========================================
    // 登入畫面與房間初始化邏輯
    // ==========================================
    const btnCreateRoom = document.getElementById('btn-create-room');
    const btnJoinRoom = document.getElementById('btn-join-room');
    const loginScreen = document.getElementById('login-screen');
    const hostScreen = document.getElementById('host-screen');
    const playerScreen = document.getElementById('player-screen');

    // 1. 主持人：創建房間
    btnCreateRoom?.addEventListener('click', () => {
        // 隨機產生 4 碼數字作為房間號碼 (也可依您的需求改為其他格式)
        const roomId = Math.floor(1000 + Math.random() * 9000).toString();
        
        // 切換 UI 畫面
        loginScreen.classList.remove('active');
        loginScreen.classList.add('hidden');
        hostScreen.classList.remove('hidden');
        hostScreen.classList.add('active'); // CSS中 .screen.active 會 display:flex
        
        // 觸發 host.js 的初始化引擎
        if (typeof initHost === 'function') {
            initHost(roomId);
        } else {
            console.error('錯誤：找不到 initHost 函式');
        }
    });

    // 2. 玩家：加入房間
    btnJoinRoom?.addEventListener('click', () => {
        const roomId = document.getElementById('input-room-id').value.trim();
        const playerName = document.getElementById('input-player-name').value.trim();

        if (!roomId || !playerName) {
            alert('請完整輸入「房間號碼」與「玩家暱稱」！');
            return;
        }

        // 切換 UI 畫面
        loginScreen.classList.remove('active');
        loginScreen.classList.add('hidden');
        playerScreen.classList.remove('hidden');
        playerScreen.classList.add('active');
        
        // 觸發 player.js 的初始化引擎
        if (typeof initPlayer === 'function') {
            initPlayer(roomId, playerName);
        } else {
            console.error('錯誤：找不到 initPlayer 函式');
        }
    });
});
</script>
</body>
</html>
