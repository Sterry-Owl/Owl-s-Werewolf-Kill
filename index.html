<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天黑請閉眼（鶯鶯製） v2.2</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #fff;">天黑請閉眼（鶯鶯製） v2.2</h2>

    <div id="role-selection" class="section" style="text-align: center;">
        <h3>請選擇登入身分</h3>
        <button onclick="showLibrarian()" style="background: #6c757d;">圖書管理員</button>
        <button onclick="initHost()">主持人 (建立房間)</button>
        <button onclick="showPlayerJoin()" style="background: var(--accent-green);">一般玩家 (加入房間)</button>
    </div>

    <div id="librarian-section" class="section hidden">
        <h3 style="color: var(--accent-blue);">圖書管理員：建置全局牌庫</h3>
        
        <div style="background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--accent-red);">
            <h4 style="margin-top: 0; color: var(--accent-red);">🔑 系統連線設定 (僅本機儲存)</h4>
            <input type="text" id="gh-user" placeholder="您的 GitHub 帳號 (例: yourname)">
            <input type="text" id="gh-repo" placeholder="儲存庫名稱 (例: card-dealer)">
            <input type="password" id="gh-token" placeholder="GitHub Personal Access Token (ghp_...)">
            <button onclick="saveGitHubAuth()" style="background: var(--accent-red); width: 100%;">儲存連線設定並讀取牌庫</button>
            <p id="gh-status" style="font-size: 12px; color: var(--text-muted);"></p>
        </div>

        <div style="background: #333; padding: 15px; border-radius: 8px;">
            <input type="text" id="lib-card-name" placeholder="卡牌名稱 (例：預言家)">
            
            <label style="display: block; margin-top: 10px; font-size: 14px; color: var(--text-muted);">選擇陣營</label>
            <div style="display: flex; gap: 10px; margin-top: 5px; margin-bottom: 10px;">
                <button type="button" class="faction-btn active" style="background: var(--accent-blue);" onclick="selectFaction('好人陣營', this)">好人陣營</button>
                <button type="button" class="faction-btn" onclick="selectFaction('狼人陣營', this)">狼人陣營</button>
                <button type="button" class="faction-btn" onclick="selectFaction('第三方陣營', this)">第三方陣營</button>
            </div>
            <input type="hidden" id="lib-card-faction" value="好人陣營">
            
            <label style="display: block; margin-top: 10px; font-size: 14px; color: var(--text-muted);">對應圖片檔名 (需預先上傳至 GitHub img 資料夾)</label>
            <input type="text" id="lib-card-img" placeholder="例: seer.png (包含副檔名，留空則無圖片)">
            
            <button id="btn-add-card" onclick="addCardToLibrary()" style="width: 100%; margin-top: 15px;" disabled>載入資料中...</button>
        </div>
        
        <table id="lib-table">
            <tr><th>圖片預覽</th><th>名稱</th><th>陣營</th><th>操作</th></tr>
        </table>
        
        <button id="btn-sync" onclick="syncToGitHub()" style="margin-top: 20px; background: var(--accent-green); width: 100%; font-size: 18px; padding: 15px;" disabled>☁️ 將目前清單同步至 GitHub 伺服器</button>
    </div>

    <div id="host-dashboard" class="section hidden">
        <h3 style="color: var(--accent-blue); display: flex; justify-content: space-between; align-items: center;">
            主控台 <span style="color: #fff; font-size: 16px;">房間代碼：<strong id="room-code-display" style="color: var(--accent-red); font-size: 32px;">...</strong></span>
        </h3>
        <hr style="border-color: var(--border-color); margin: 20px 0;">
        <h4 style="text-align: center; color: var(--text-muted);">房間成員狀態</h4>
        <div id="host-circle-container" class="circle-container" style="width: 350px; height: 350px;"></div>
        <div style="text-align: center; margin: 20px 0;">
            <button onclick="dealCards()" id="btn-deal" style="font-size: 18px; padding: 12px 24px;">開始發牌</button>
            <button onclick="resetGame()" id="btn-reset" style="background: var(--accent-red); font-size: 18px; padding: 12px 24px; display: none;">收回卡牌並重新設定</button>
        </div>
        <hr style="border-color: var(--border-color); margin: 20px 0;">
        <h4 style="color: var(--text-muted);">本局配置 <span id="config-status-text" style="font-size: 12px; color: var(--accent-green);">(可修改)</span></h4>
        <div id="host-config-gallery" class="config-gallery"></div>
        <h3 style="text-align: right; margin-top: 20px;">本局總張數：<strong id="host-total-cards" style="color: var(--accent-blue); font-size: 24px;">0</strong></h3>
    </div>

    <div id="player-join-section" class="section hidden" style="max-width: 400px; margin: auto;">
        <h3 style="text-align: center; color: var(--accent-green);">加入房間</h3>
        <input type="text" id="join-room-code" placeholder="請輸入房間代碼 (4碼)" style="font-size: 18px; text-align: center; letter-spacing: 2px;">
        <input type="text" id="join-player-name" placeholder="請輸入您的暱稱" style="font-size: 18px; text-align: center;">
        <button onclick="initPlayer()" style="width: 100%; font-size: 18px; background: var(--accent-green); padding: 12px; margin-top: 15px;">進入房間</button>
        <div id="player-status" style="margin-top: 15px; color: var(--text-muted); text-align: center;"></div>
    </div>

    <div id="player-hand-section" class="section hidden">
        <h4 style="text-align: center; color: var(--text-muted);">遊戲狀態</h4>
        <div id="player-circle-container" class="circle-container">
            <div class="center-card-view">
                <h3 id="my-card-title" style="color: var(--text-muted); margin: 0 0 5px 0;">等待發牌...</h3>
                <span id="my-card-faction" class="badge hidden" style="background: var(--accent-blue);"></span>
                <img id="my-card-img" class="hidden" src="" alt="卡牌圖片">
            </div>
        </div>
        <hr style="border-color: var(--border-color); margin: 30px 0;">
        <h4 style="color: var(--text-muted);">本局牌庫配置</h4>
        <div id="player-config-gallery" class="config-gallery">
            <p style="color: #666; width: 100%;">等待同步資料...</p>
        </div>
    </div>
</div>

<script src="./js/config.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/library.js"></script>
<script src="./js/host.js"></script>
<script src="./js/player.js"></script>
</body>
</html>
