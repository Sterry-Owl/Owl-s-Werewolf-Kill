<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天黑請閉眼（鶯鶯製） v1.4</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-dark: #121212;
            --container-bg: #1e1e1e;
            --section-bg: #2a2a2a;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #444;
            --accent-blue: #3a86ff;
            --accent-red: #ef233c;
            --accent-green: #38b000;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; background: var(--bg-dark); color: var(--text-main); margin: 0; }
        .container { max-width: 1000px; margin: auto; background: var(--container-bg); padding: 25px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.6); }
        .hidden { display: none !important; }
        .section { margin-bottom: 25px; padding: 20px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--section-bg); }
        
        button { padding: 10px 18px; background: var(--accent-blue); color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px 2px; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; cursor: not-allowed; color: #888; }
        
        input[type="text"], input[type="number"] { padding: 10px; margin: 8px 0; width: 100%; box-sizing: border-box; background: #333; color: white; border: 1px solid var(--border-color); border-radius: 4px; }
        input[type="number"]:disabled { background: #222; color: #666; border-color: #333; }
        
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; color: white; background: #555; }
        
        .config-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; margin-top: 15px; }
        .config-card { background: #333; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; text-align: center; position: relative; }
        .config-card img { max-width: 80px; max-height: 80px; border-radius: 6px; object-fit: contain; margin-bottom: 10px; background: #222; }
        .config-card input { width: 60px; text-align: center; margin-top: 5px; }
        .config-qty-text { font-size: 18px; font-weight: bold; color: var(--accent-blue); margin-top: 8px; }

        /* 圓形座位表公用設定 */
        .circle-container { position: relative; width: 400px; height: 400px; margin: 20px auto; border-radius: 50%; border: 2px dashed var(--border-color); background: rgba(0,0,0,0.1); }
        .seat { position: absolute; width: 60px; height: 60px; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; justify-content: center; background: #444; border-radius: 50%; font-size: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); text-align: center; line-height: 1.2; border: 2px solid transparent; z-index: 2; }
        .seat.is-me { border-color: var(--accent-green); background: #2b4a2b; font-weight: bold; }
        .seat-num { font-size: 16px; color: var(--accent-blue); font-weight: bold; }
        .role-label { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); background: var(--accent-blue); color: white; font-size: 11px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; z-index: 3; }

        /* 玩家專屬視角 - 中央卡牌 */
        .center-card-view { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; justify-content: center; width: 200px; height: 260px; text-align: center; z-index: 1; }
        .center-card-view img { max-width: 140px; max-height: 180px; border-radius: 8px; object-fit: contain; box-shadow: 0 6px 15px rgba(0,0,0,0.8); margin: 10px 0; background: #222; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #fff;">天黑請閉眼（鶯鶯製） v1.4</h2>

    <div id="role-selection" class="section" style="text-align: center;">
        <h3>請選擇登入身分</h3>
        <button onclick="initHost()">主持人 (建立房間)</button>
        <button onclick="showPlayerJoin()" style="background: var(--accent-green);">一般玩家 (加入房間)</button>
    </div>

    <div id="host-dashboard" class="section hidden">
        <h3 style="color: var(--accent-blue); display: flex; justify-content: space-between; align-items: center;">
            主控台
            <span style="color: #fff; font-size: 16px;">房間代碼：<strong id="room-code-display" style="color: var(--accent-red); font-size: 32px;">...</strong></span>
        </h3>
        <hr style="border-color: var(--border-color); margin: 20px 0;">
        
        <h4 style="text-align: center; color: var(--text-muted);">房間成員狀態</h4>
        <div id="host-circle-container" class="circle-container" style="width: 350px; height: 350px;"></div>

        <div style="text-align: center; margin: 20px 0;">
            <button onclick="dealCards()" id="btn-deal" style="font-size: 18px; padding: 12px 24px;">開始發牌</button>
            <button onclick="resetGame()" id="btn-reset" style="background: var(--accent-red); font-size: 18px; padding: 12px 24px; display: none;">收回卡牌並重新設定</button>
        </div>

        <hr style="border-color: var(--border-color); margin: 20px 0;">
        <h4 style="color: var(--text-muted);">本局配置 <span id="config-status-text" style="font-size: 12px; color: var(--accent-green);">(可修改)</span></h4>
        <div id="host-config-gallery" class="config-gallery"></div>
        <h3 style="text-align: right; margin-top: 20px;">本局總張數：<strong id="host-total-cards" style="color: var(--accent-blue); font-size: 24px;">0</strong></h3>
    </div>

    <div id="player-join-section" class="section hidden" style="max-width: 400px; margin: auto;">
        <h3 style="text-align: center; color: var(--accent-green);">加入房間</h3>
        <input type="text" id="join-room-code" placeholder="請輸入房間代碼 (4碼)" style="font-size: 18px; text-align: center; letter-spacing: 2px;">
        <input type="text" id="join-player-name" placeholder="請輸入您的暱稱" style="font-size: 18px; text-align: center;">
        <button onclick="initPlayer()" style="width: 100%; font-size: 18px; background: var(--accent-green); padding: 12px; margin-top: 15px;">進入房間</button>
        <div id="player-status" style="margin-top: 15px; color: var(--text-muted); text-align: center;"></div>
    </div>

    <div id="player-hand-section" class="section hidden">
        <h4 style="text-align: center; color: var(--text-muted);">遊戲狀態</h4>
        <div id="player-circle-container" class="circle-container">
            <div class="center-card-view">
                <h3 id="my-card-title" style="color: var(--text-muted); margin: 0 0 5px 0;">等待發牌...</h3>
                <span id="my-card-faction" class="badge hidden" style="background: var(--accent-blue);"></span>
                <img id="my-card-img" class="hidden" src="" alt="卡牌圖片">
            </div>
        </div>
        
        <hr style="border-color: var(--border-color); margin: 30px 0;">

        <h4 style="color: var(--text-muted);">本局牌庫配置</h4>
        <div id="player-config-gallery" class="config-gallery">
            <p style="color: #666; width: 100%;">等待同步資料...</p>
        </div>
    </div>
</div>

<script>
    const peerConfig = {
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' }
            ]
        }
    };

    let peer = null;
    let connections = {}; 
    let players = []; 
    let roomConfig = []; 
    let fullDeck = []; 
    let nextSeatNumber = 1; 
    let myPeerId = null; 
    let isGameDealt = false; // 控制是否已發牌，決定配置是否可修改
    const defaultSvg = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="%23555"><rect width="80" height="80"/></svg>';

    // ==================== 共用邏輯 ====================
    async function loadCardsLibrary() {
        try {
            const res = await fetch('cards.json');
            if (!res.ok) throw new Error('File not found');
            const data = await res.json();
            return data.map(card => ({ ...card, qty: 0 }));
        } catch (error) {
            alert('無法讀取 cards.json，請確認檔案已正確上傳至 GitHub 根目錄。');
            return [];
        }
    }

    // ==================== 主持人邏輯 ====================
    async function initHost() {
        document.getElementById('role-selection').classList.add('hidden');
        
        // 直接從 JSON 讀取牌庫
        roomConfig = await loadCardsLibrary();
        if (roomConfig.length === 0) return;

        document.getElementById('host-dashboard').classList.remove('hidden');
        renderHostConfigGallery();
        
        const roomCode = Math.floor(1000 + Math.random() * 9000).toString();
        const peerId = 'ROOM-' + roomCode;
        peer = new Peer(peerId, peerConfig);
        
        peer.on('open', (id) => {
            document.getElementById('room-code-display').innerText = roomCode;
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.type === 'JOIN') {
                    players.push({ id: conn.peer, name: data.name, card: null, seat: nextSeatNumber++ });
                    connections[conn.peer] = conn;
                    renderHostCircle();
                    conn.send({ type: 'CONFIG', config: roomConfig });
                    broadcastPlayerList(); 
                }
            });
            conn.on('close', () => {
                players = players.filter(p => p.id !== conn.peer);
                delete connections[conn.peer];
                renderHostCircle();
                broadcastPlayerList(); 
            });
        });
    }

    function renderHostConfigGallery() {
        const gallery = document.getElementById('host-config-gallery');
        gallery.innerHTML = '';
        let total = 0;
        roomConfig.forEach((card, index) => {
            total += card.qty;
            const imgSrc = card.img || defaultSvg;
            gallery.innerHTML += `
                <div class="config-card">
                    <img src="${imgSrc}" alt="${card.name}">
                    <div style="font-size:14px; font-weight:bold;">${card.name}</div>
                    <div style="font-size:11px; color:#aaa;">${card.faction || '無陣營'}</div>
                    <input type="number" min="0" value="${card.qty}" onchange="updateCardQty(${index}, this.value)" ${isGameDealt ? 'disabled' : ''}>
                </div>
            `;
        });
        document.getElementById('host-total-cards').innerText = total;
    }

    function updateCardQty(index, value) {
        if (isGameDealt) return;
        roomConfig[index].qty = parseInt(value) || 0;
        let total = roomConfig.reduce((sum, card) => sum + card.qty, 0);
        document.getElementById('host-total-cards').innerText = total;
        broadcastConfig();
    }

    function broadcastConfig() {
        Object.values(connections).forEach(conn => {
            conn.send({ type: 'CONFIG', config: roomConfig });
        });
    }

    function broadcastPlayerList() {
        const safeList = players.map(p => ({ id: p.id, name: p.name, seat: p.seat }));
        Object.values(connections).forEach(conn => {
            conn.send({ type: 'PLAYERS_UPDATE', list: safeList });
        });
    }

    function dealCards() {
        if (players.length === 0) return alert('沒有玩家加入房間');
        
        fullDeck = [];
        roomConfig.forEach(c => {
            for(let i=0; i<c.qty; i++) {
                fullDeck.push({ name: c.name, faction: c.faction, img: c.img });
            }
        });

        if (fullDeck.length < players.length) return alert('卡牌總數少於玩家人數，請增加配置！');

        for (let i = fullDeck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [fullDeck[i], fullDeck[j]] = [fullDeck[j], fullDeck[i]];
        }

        players.forEach(p => {
            const dealtCard = fullDeck.pop();
            p.card = dealtCard;
            if (connections[p.id]) {
                connections[p.id].send({ type: 'DEAL', card: dealtCard });
            }
        });
        
        // 鎖定配置表單
        isGameDealt = true;
        document.getElementById('config-status-text').innerText = '(已鎖定)';
        document.getElementById('config-status-text').style.color = 'var(--accent-red)';
        document.getElementById('btn-deal').style.display = 'none';
        document.getElementById('btn-reset').style.display = 'inline-block';
        
        renderHostConfigGallery();
        renderHostCircle();
    }

    function resetGame() {
        players.forEach(p => p.card = null);
        Object.values(connections).forEach(conn => {
            conn.send({ type: 'RESET' });
        });
        
        // 解鎖配置表單
        isGameDealt = false;
        document.getElementById('config-status-text').innerText = '(可修改)';
        document.getElementById('config-status-text').style.color = 'var(--accent-green)';
        document.getElementById('btn-deal').style.display = 'inline-block';
        document.getElementById('btn-reset').style.display = 'none';
        
        renderHostConfigGallery();
        renderHostCircle();
    }

    // ==================== 玩家邏輯 ====================
    function showPlayerJoin() {
        document.getElementById('role-selection').classList.add('hidden');
        document.getElementById('player-join-section').classList.remove('hidden');
    }

    function initPlayer() {
        const roomCode = document.getElementById('join-room-code').value.trim();
        const playerName = document.getElementById('join-player-name').value.trim();
        if (!roomCode || !playerName) return alert('請輸入完整資訊');

        const hostId = 'ROOM-' + roomCode;
        peer = new Peer(undefined, peerConfig);
        const statusDiv = document.getElementById('player-status');
        statusDiv.innerText = '尋找房間中...';

        peer.on('open', (id) => {
            myPeerId = id; 
            statusDiv.innerText = '建立連線中...';
            const conn = peer.connect(hostId, { reliable: true });
            
            conn.on('open', () => {
                document.getElementById('player-join-section').classList.add('hidden');
                document.getElementById('player-hand-section').classList.remove('hidden');
                conn.send({ type: 'JOIN', name: playerName });
            });

            conn.on('data', (data) => {
                if (data.type === 'CONFIG') {
                    const gallery = document.getElementById('player-config-gallery');
                    gallery.innerHTML = '';
                    let hasCards = false;
                    data.config.forEach(c => {
                        if (c.qty > 0) {
                            const imgSrc = c.img || defaultSvg;
                            gallery.innerHTML += `
                                <div class="config-card">
                                    <img src="${imgSrc}">
                                    <div style="font-size:12px;">${c.name}</div>
                                    <div class="config-qty-text">× ${c.qty}</div>
                                </div>
                            `;
                            hasCards = true;
                        }
                    });
                    if (!hasCards) gallery.innerHTML = '<p style="color:#666; width:100%;">本局目前無卡牌</p>';
                } 
                else if (data.type === 'PLAYERS_UPDATE') {
                    renderPlayerCircle(data.list);
                }
                else if (data.type === 'DEAL') {
                    document.getElementById('my-card-title').innerText = data.card.name;
                    document.getElementById('my-card-title').style.color = 'white';
                    
                    const factionEl = document.getElementById('my-card-faction');
                    if(data.card.faction) {
                        factionEl.innerText = data.card.faction;
                        factionEl.classList.remove('hidden');
                    } else { factionEl.classList.add('hidden'); }

                    const imgEl = document.getElementById('my-card-img');
                    if (data.card.img) {
                        imgEl.src = data.card.img;
                        imgEl.classList.remove('hidden');
                    } else { imgEl.classList.add('hidden'); }
                } 
                else if (data.type === 'RESET') {
                    document.getElementById('my-card-title').innerText = '等待發牌...';
                    document.getElementById('my-card-title').style.color = 'var(--text-muted)';
                    document.getElementById('my-card-faction').classList.add('hidden');
                    document.getElementById('my-card-img').classList.add('hidden');
                }
            });
            conn.on('error', () => { statusDiv.innerText = '連線斷開。'; });
        });
        peer.on('error', () => { statusDiv.innerHTML = `<span style="color:var(--accent-red);">連線失敗，請檢查房號或網路環境。</span>`; });
    }

    // ==================== 圓形排版演算法 ====================
    // 主持人視角：容器 350x350，顯示所有玩家職業
    function renderHostCircle() {
        const container = document.getElementById('host-circle-container');
        container.innerHTML = '';
        const total = players.length;
        if(total === 0) return;
        
        const radius = 140; 
        const center = 175; 
        
        players.forEach((p, i) => {
            const angle = (i / total) * 2 * Math.PI - (Math.PI / 2);
            const x = center + radius * Math.cos(angle) - 30; 
            const y = center + radius * Math.sin(angle) - 30;
            
            const seatDiv = document.createElement('div');
            seatDiv.className = 'seat';
            seatDiv.style.left = `${x}px`;
            seatDiv.style.top = `${y}px`;
            
            let roleHtml = '';
            if (p.card) {
                roleHtml = `<div class="role-label">${p.card.name}</div>`;
            }

            const shortName = p.name.length > 4 ? p.name.substring(0,4) + '..' : p.name;
            seatDiv.innerHTML = `${roleHtml}<span class="seat-num">${p.seat}</span><span>${shortName}</span>`;
            
            container.appendChild(seatDiv);
        });
    }

    // 玩家視角：容器 400x400，中央保留空間顯示卡牌，不顯示他人職業
    function renderPlayerCircle(playersList) {
        const container = document.getElementById('player-circle-container');
        // 清除除了中央卡牌區塊以外的所有座位
        const centerView = container.querySelector('.center-card-view');
        container.innerHTML = '';
        container.appendChild(centerView);

        const total = playersList.length;
        if(total === 0) return;
        
        const radius = 170; 
        const center = 200; 
        
        playersList.forEach((p, i) => {
            const angle = (i / total) * 2 * Math.PI - (Math.PI / 2);
            const x = center + radius * Math.cos(angle) - 30; 
            const y = center + radius * Math.sin(angle) - 30;
            
            const seatDiv = document.createElement('div');
            seatDiv.className = 'seat';
            if (p.id === myPeerId) seatDiv.classList.add('is-me');
            seatDiv.style.left = `${x}px`;
            seatDiv.style.top = `${y}px`;
            
            const shortName = p.name.length > 4 ? p.name.substring(0,4) + '..' : p.name;
            seatDiv.innerHTML = `<span class="seat-num">${p.seat}</span><span>${shortName}</span>`;
            
            container.appendChild(seatDiv);
        });
    }
</script>
</body>
</html>
