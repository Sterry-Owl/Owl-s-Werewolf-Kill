<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天黑請閉眼（鶯鶯製） v2.6.1</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #fff;">天黑請閉眼（鶯鶯製） v2.6.1</h2>

    <div id="role-selection" class="section" style="text-align: center;">
        <h3>請選擇登入身分</h3>
        <button onclick="document.getElementById('role-selection').classList.add('hidden'); document.getElementById('librarian-section').classList.remove('hidden');" style="background: #6c757d;">圖書管理員</button>
        <button id="btn-create-room">主持人 (建立房間)</button>
        <button onclick="document.getElementById('role-selection').classList.add('hidden'); document.getElementById('player-join-section').classList.remove('hidden');" style="background: var(--accent-green);">一般玩家 (加入房間)</button>
    </div>

    <!-- 圖書管理員 -->
    <div id="librarian-section" class="section hidden">
        <h3 style="color: var(--accent-blue);">圖書管理員：建置全局牌庫</h3>
        <div style="background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--accent-red);">
            <h4 style="margin-top: 0; color: var(--accent-red);">🔑 系統連線設定 (僅本機儲存)</h4>
            <input type="text" id="gh-user" placeholder="您的 GitHub 帳號 (例: yourname)">
            <input type="text" id="gh-repo" placeholder="儲存庫名稱 (例: card-dealer)">
            <input type="password" id="gh-token" placeholder="GitHub Personal Access Token (ghp_...)">
            <button onclick="saveGitHubAuth()" style="background: var(--accent-red); width: 100%;">儲存連線設定並讀取牌庫</button>
            <p id="gh-status" style="font-size: 12px; color: var(--text-muted);"></p>
        </div>

        <div style="background: #333; padding: 15px; border-radius: 8px;">
            <input type="text" id="lib-card-name" placeholder="卡牌名稱 (例：預言家)">
            <label style="display: block; margin-top: 10px; font-size: 14px; color: var(--text-muted);">選擇陣營</label>
            <div style="display: flex; gap: 10px; margin-top: 5px; margin-bottom: 10px;">
                <button type="button" class="faction-btn active" style="background: var(--accent-blue);" onclick="selectFaction('好人陣營', this)">好人陣營</button>
                <button type="button" class="faction-btn" onclick="selectFaction('狼人陣營', this)">狼人陣營</button>
                <button type="button" class="faction-btn" onclick="selectFaction('第三方陣營', this)">第三方陣營</button>
            </div>
            <input type="hidden" id="lib-card-faction" value="好人陣營">
            <input type="text" id="lib-card-img" placeholder="例: seer.png (包含副檔名，留空則無圖片)" style="margin-top: 10px;">
            <button id="btn-add-card" onclick="addCardToLibrary()" style="width: 100%; margin-top: 15px;" disabled>載入資料中...</button>
        </div>
        
        <table id="lib-table"><tr><th>圖片預覽</th><th>名稱</th><th>陣營</th><th>操作</th></tr></table>
        <button id="btn-sync" onclick="syncToGitHub()" style="margin-top: 20px; background: var(--accent-green); width: 100%; font-size: 18px; padding: 15px;" disabled>☁️ 將目前清單同步至 GitHub 伺服器</button>
        <button onclick="location.reload()" style="background: var(--accent-red); width: 100%; margin-top: 15px; font-size: 18px; padding: 15px;">返回主畫面</button>
    </div>

    <!-- 玩家加入 -->
    <div id="player-join-section" class="section hidden" style="max-width: 400px; margin: auto;">
        <h3 style="text-align: center; color: var(--accent-green);">加入房間</h3>
        <input type="text" id="input-room-id" placeholder="請輸入房間代碼 (4碼)" style="font-size: 18px; text-align: center; letter-spacing: 2px;">
        <input type="text" id="input-player-name" placeholder="請輸入您的暱稱" style="font-size: 18px; text-align: center;">
        <button id="btn-join-room" style="width: 100%; font-size: 18px; background: var(--accent-green); padding: 12px; margin-top: 15px;">進入房間</button>
    </div>

    <!-- 主持人主控台 -->
    <div id="host-screen" class="section hidden">
        <h3 style="color: var(--accent-blue); display: flex; justify-content: space-between; align-items: center;">
            主控台 <span style="color: #fff; font-size: 16px;">房間代碼：<strong id="display-room-id" style="color: var(--accent-red); font-size: 32px;">...</strong></span>
        </h3>
        <hr style="border-color: var(--border-color); margin: 20px 0;">
        
        <h4 style="text-align: center; color: var(--text-muted);">本局玩家總覽</h4>
        <div id="host-players-grid"></div>

        <div id="host-setup-panel">
            <h4 style="text-align: center; color: var(--text-muted); margin-top: 30px;">步驟一：設定本局角色數量 (當前牌堆: <span id="deck-count-display" style="color: var(--accent-red); font-size: 20px;">0</span>)</h4>
            <div id="role-selection-grid" class="config-gallery"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button id="btn-start-game-logic" style="background: var(--accent-blue); font-size: 18px; padding: 12px 24px;">確認配置並發牌</button>
            </div>
        </div>

        <div id="host-runtime-panel" class="hidden">
            <button id="btn-end-game" class="btn-danger" style="margin-bottom: 15px;" onclick="location.reload()">結束遊戲並返回主畫面</button>
            <div class="host-layout">
                <div class="control-panel-container" style="width: 100%;">
                    <div id="day-dashboard" class="phase-dashboard hidden">
                        <h4 style="margin-top:0; color: var(--accent-blue);">白天階段</h4>
                        <div class="action-buttons">
                            <button id="btn-vote-flow" style="background: var(--accent-blue); color: white; padding: 10px; border-radius: 6px; font-weight: bold; border: none;">發起投票</button>
                            <button id="btn-interrupt-skill" class="btn-secondary">作廢/插隊技能</button>
                        </div>
                        <div id="vote-results-container" class="system-log">等待行動...</div>
                    </div>

                    <div id="night-dashboard" class="phase-dashboard hidden">
                        <h4 style="margin-top:0; color: var(--accent-blue);">夜晚階段</h4>
                        <button id="btn-start-night" style="background: var(--accent-blue); color: white; padding: 10px; border-radius: 6px; font-weight: bold; border: none;">開始夜晚推進</button>
                        <button id="btn-end-night" class="hidden" style="background: var(--accent-blue); color: white; padding: 10px; border-radius: 6px; font-weight: bold; border: none;">天亮結算</button>
                        <ul id="night-flow-list" class="flow-list"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 玩家操作介面 -->
    <div id="player-screen" class="section hidden">
        <h3 style="text-align: center; color: var(--text-muted);">
            你的座位: <span id="player-seat-number" style="color: white;">-</span>號
        </h3>
        <div id="player-role-display" class="hidden" style="text-align: center; font-size: 22px; color: var(--accent-red); margin-bottom: 20px; font-weight: bold;">
            身分: <span id="player-role-name"></span>
        </div>

        <div id="player-config-display" style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-bottom: 15px; padding: 10px; background: #222; border-radius: 8px; border: 1px solid var(--border-color);">
            <span style="color: var(--text-muted); font-size: 14px; width: 100%; text-align: center;">本局配置 (等待同步...)</span>
        </div>

        <!-- 修正圓桌外層容器避免被裁切 -->
        <div style="position: relative; width: 450px; height: 450px; margin: 20px auto;">
            <div id="player-targets-grid" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
            <div id="player-circle-container" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; text-align: center; z-index: 10;">
                <h3 id="my-card-title" style="color: var(--text-muted); margin: 0 0 5px 0; font-size: 14px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">等待發牌...</h3>
                <img id="my-card-img" class="hidden" src="" alt="卡牌圖片" style="width: 100%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.6);">
            </div>
        </div>

        <div id="player-status-message" class="status-message" style="margin-top: 20px;">等待遊戲開始...</div>

        <button id="btn-day-skill" class="btn-primary hidden" style="width: 100%; margin-bottom: 10px; padding: 15px; font-size: 18px;">發動白天技能</button>
        <button id="btn-self-destruct" class="btn-danger hidden" style="width: 100%; margin-bottom: 10px; padding: 15px; font-size: 18px;">我要自爆</button>

        <div id="player-action-panel" class="action-panel hidden">
            <h4 id="action-prompt" style="color: var(--accent-blue); margin-top: 0;">請選擇目標</h4>
            <div id="special-options-container" class="special-options hidden"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                <button id="btn-confirm-action" class="btn-primary" disabled>確認</button>
                <button id="btn-pass-action" class="btn-secondary hidden">跳過</button>
                <button id="btn-cancel-action" class="btn-secondary hidden">取消</button>
            </div>
        </div>

        <div id="player-voting-panel" class="voting-panel hidden">
            <h4 style="color: var(--accent-red); margin-top: 0;">放逐投票</h4>
            <div id="voting-targets-grid"></div>
            <button id="btn-abstain-vote" class="btn-secondary" style="margin-top: 15px;">棄票</button>
        </div>
    </div>
</div>

<script src="./js/config.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/library.js"></script>
<script src="./js/host.js"></script>
<script src="./js/player.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const baseRoles = ["平民", "獵人", "隱狼", "白痴", "騎士", "定序王子", "盜賊", "邱比特", "咒狐", "暗戀者", "噩夢之影-恐懼", "蝕時狼妃-封鎖", "魔術師", "奇蹟商人", "攝夢人", "守衛", "狼人", "狼王", "白狼王", "狼美人-魅惑", "惡靈騎士", "血月使徒", "狼鴉之爪-睜眼", "石像鬼", "女巫-解藥", "預言家", "純白之女", "守墓人", "烏鴉", "獵魔人"];
    
    const setupGrid = document.getElementById('role-selection-grid');
    baseRoles.forEach(roleName => {
        let displayName = roleName.split('-')[0];
        const card = document.createElement('div');
        card.className = 'config-card';
        card.innerHTML = `
            <img src="./img/${displayName}.png" style="width: 60px; height: 60px; object-fit: contain; margin-bottom: 5px; background: #222; border-radius: 6px;" onerror="this.style.display='none'">
            <div style="font-size: 14px; font-weight: bold; margin-bottom: 5px;">${displayName}</div>
            <div style="display: flex; justify-content: center; align-items: center; gap: 8px;">
                <button type="button" class="btn-minus" data-role="${roleName}" style="padding: 2px 10px; background: #555; color: white; border: none; border-radius: 4px;">-</button>
                <span class="role-qty-display" id="qty-${roleName}" data-val="0" style="font-size: 16px; font-weight: bold; width: 20px;">0</span>
                <button type="button" class="btn-plus" data-role="${roleName}" style="padding: 2px 10px; background: var(--accent-blue); color: white; border: none; border-radius: 4px;">+</button>
            </div>
        `;
        setupGrid.appendChild(card);
    });

    const updateDeckCount = () => {
        let count = 0;
        let currentDeck = [];
        document.querySelectorAll('.role-qty-display').forEach(span => {
            let val = parseInt(span.dataset.val) || 0;
            count += val;
            let fullRoleName = span.id.replace('qty-', '');
            let actualRoleName = fullRoleName.split('-')[0];
            for (let i = 0; i < val; i++) currentDeck.push(actualRoleName);
        });
        const display = document.getElementById('deck-count-display');
        if (display) display.textContent = count;
        
        // 觸發實時同步
        if (typeof syncDeckToPlayers === 'function') syncDeckToPlayers(currentDeck);
    };

    document.getElementById('role-selection-grid').addEventListener('click', (e) => {
        if (e.target.classList.contains('btn-minus') || e.target.classList.contains('btn-plus')) {
            const role = e.target.dataset.role;
            const span = document.getElementById(`qty-${role}`);
            let val = parseInt(span.dataset.val) || 0;
            if (e.target.classList.contains('btn-minus') && val > 0) val--;
            if (e.target.classList.contains('btn-plus')) val++;
            span.dataset.val = val;
            span.textContent = val;
            updateDeckCount();
        }
    });

    document.getElementById('btn-create-room')?.addEventListener('click', () => {
        const roomId = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('role-selection').classList.add('hidden');
        document.getElementById('host-screen').classList.remove('hidden');
        if (typeof initHost === 'function') initHost(roomId);
    });

    document.getElementById('btn-join-room')?.addEventListener('click', () => {
        const roomId = document.getElementById('input-room-id').value;
        const name = document.getElementById('input-player-name').value;
        if (!roomId || !name) return alert('請輸入完整資訊');
        document.getElementById('player-join-section').classList.add('hidden');
        document.getElementById('player-screen').classList.remove('hidden');
        if (typeof initPlayer === 'function') initPlayer(roomId, name);
    });

    document.getElementById('btn-start-game-logic')?.addEventListener('click', () => {
        let deck = [];
        baseRoles.forEach(roleName => {
            const span = document.getElementById(`qty-${roleName}`);
            let actualRoleName = roleName.split('-')[0];
            let qty = parseInt(span.dataset.val) || 0;
            if (qty > 0) {
                for (let i = 0; i < qty; i++) deck.push(actualRoleName);
            }
        });
        
        if (deck.length === 0) return alert('請至少選擇一名角色！');
        
        if (typeof startGame === 'function') {
            // 防呆機制：如果回傳 true 才隱藏配置介面
            if (startGame(deck)) {
                document.getElementById('host-setup-panel').classList.add('hidden');
                document.getElementById('host-runtime-panel').classList.remove('hidden');
            }
        }
    });
});
</script>
</body>
</html>
