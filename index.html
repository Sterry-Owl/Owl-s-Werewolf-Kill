<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天黑請閉眼（鶯鶯製） v2.3 </title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #fff;">天黑請閉眼（鶯鶯製） v2.3</h2>

    <div id="role-selection" class="section" style="text-align: center;">
        <h3>請選擇登入身分</h3>
        <button onclick="document.getElementById('role-selection').classList.add('hidden'); document.getElementById('librarian-section').classList.remove('hidden');" style="background: #6c757d;">圖書管理員</button>
        <button id="btn-create-room">主持人 (建立房間)</button>
        <button onclick="document.getElementById('role-selection').classList.add('hidden'); document.getElementById('player-join-section').classList.remove('hidden');" style="background: var(--accent-green);">一般玩家 (加入房間)</button>
    </div>

    <div id="librarian-section" class="section hidden">
        <h3 style="color: var(--accent-blue);">圖書管理員：建置全局牌庫</h3>
        
        <div style="background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--accent-red);">
            <h4 style="margin-top: 0; color: var(--accent-red);">🔑 系統連線設定 (僅本機儲存)</h4>
            <input type="text" id="gh-user" placeholder="您的 GitHub 帳號 (例: yourname)">
            <input type="text" id="gh-repo" placeholder="儲存庫名稱 (例: card-dealer)">
            <input type="password" id="gh-token" placeholder="GitHub Personal Access Token (ghp_...)">
            <button onclick="saveGitHubAuth()" style="background: var(--accent-red); width: 100%;">儲存連線設定並讀取牌庫</button>
            <p id="gh-status" style="font-size: 12px; color: var(--text-muted);"></p>
        </div>

        <div style="background: #333; padding: 15px; border-radius: 8px;">
            <input type="text" id="lib-card-name" placeholder="卡牌名稱 (例：預言家)">
            
            <label style="display: block; margin-top: 10px; font-size: 14px; color: var(--text-muted);">選擇陣營</label>
            <div style="display: flex; gap: 10px; margin-top: 5px; margin-bottom: 10px;">
                <button type="button" class="faction-btn active" style="background: var(--accent-blue);" onclick="selectFaction('好人陣營', this)">好人陣營</button>
                <button type="button" class="faction-btn" onclick="selectFaction('狼人陣營', this)">狼人陣營</button>
                <button type="button" class="faction-btn" onclick="selectFaction('第三方陣營', this)">第三方陣營</button>
            </div>
            <input type="hidden" id="lib-card-faction" value="好人陣營">
            
            <label style="display: block; margin-top: 10px; font-size: 14px; color: var(--text-muted);">對應圖片檔名 (需預先上傳至 GitHub img 資料夾)</label>
            <input type="text" id="lib-card-img" placeholder="例: seer.png (包含副檔名，留空則無圖片)">
            
            <button id="btn-add-card" onclick="addCardToLibrary()" style="width: 100%; margin-top: 15px;" disabled>載入資料中...</button>
        </div>
        
        <table id="lib-table">
            <tr><th>圖片預覽</th><th>名稱</th><th>陣營</th><th>操作</th></tr>
        </table>
        
        <button id="btn-sync" onclick="syncToGitHub()" style="margin-top: 20px; background: var(--accent-green); width: 100%; font-size: 18px; padding: 15px;" disabled>☁️ 將目前清單同步至 GitHub 伺服器</button>
        
        <button onclick="location.reload()" style="background: var(--accent-red); width: 100%; margin-top: 15px; font-size: 18px; padding: 15px;">返回主畫面</button>
    </div>

    <div id="player-join-section" class="section hidden" style="max-width: 400px; margin: auto;">
        <h3 style="text-align: center; color: var(--accent-green);">加入房間</h3>
        <input type="text" id="input-room-id" placeholder="請輸入房間代碼 (4碼)" style="font-size: 18px; text-align: center; letter-spacing: 2px;">
        <input type="text" id="input-player-name" placeholder="請輸入您的暱稱" style="font-size: 18px; text-align: center;">
        <button id="btn-join-room" style="width: 100%; font-size: 18px; background: var(--accent-green); padding: 12px; margin-top: 15px;">進入房間</button>
    </div>

    <div id="host-screen" class="section hidden">
        <h3 style="color: var(--accent-blue); display: flex; justify-content: space-between; align-items: center;">
            主控台 <span style="color: #fff; font-size: 16px;">房間代碼：<strong id="display-room-id" style="color: var(--accent-red); font-size: 32px;">...</strong></span>
        </h3>
        <hr style="border-color: var(--border-color); margin: 20px 0;">
        
        <div id="host-setup-panel">
            <h4 style="text-align: center; color: var(--text-muted);">步驟一：設定本局角色數量</h4>
            <div id="role-selection-grid" class="config-gallery">
                </div>
            <div style="text-align: center; margin-top: 20px;">
                <button id="btn-start-game-logic" style="background: var(--accent-red); font-size: 18px; padding: 12px 24px;">確認配置並發牌</button>
            </div>
        </div>

        <div id="host-runtime-panel" class="hidden">
            <div class="host-layout">
                <div class="main-table-container">
                    <h4 style="margin-top:0; color: var(--text-muted);">玩家狀態總覽</h4>
                    <div id="host-players-grid" class="players-grid"></div>
                </div>

                <div class="control-panel-container">
                    <div id="day-dashboard" class="phase-dashboard hidden">
                        <h4 style="margin-top:0; color: var(--accent-blue);">白天階段</h4>
                        <div class="action-buttons">
                            <button id="btn-start-vote" class="btn-secondary">發起暗投</button>
                            <button id="btn-interrupt-skill" class="btn-secondary">作廢/插隊技能</button>
                            <button id="btn-end-day" class="btn-primary">進入黑夜</button>
                        </div>
                        <div id="vote-results-container" class="system-log">等待行動...</div>
                    </div>

                    <div id="night-dashboard" class="phase-dashboard hidden">
                        <h4 style="margin-top:0; color: var(--accent-blue);">夜晚階段</h4>
                        <button id="btn-start-night" class="btn-primary">開始夜晚推進</button>
                        <button id="btn-end-night" class="btn-primary hidden">天亮結算</button>
                        <ul id="night-flow-list" class="flow-list"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="player-screen" class="section hidden">
        <h3 style="text-align: center; color: var(--text-muted);">
            你的座位: <span id="player-seat-number" style="color: white;">-</span>號
        </h3>
        <div id="player-role-display" class="hidden" style="text-align: center; font-size: 22px; color: var(--accent-red); margin-bottom: 20px; font-weight: bold;">
            身分: <span id="player-role-name"></span>
        </div>

        <button id="btn-self-destruct" class="btn-danger hidden">我要自爆</button>
        <div id="player-status-message" class="status-message">等待遊戲開始...</div>

        <div id="player-action-panel" class="action-panel hidden">
            <h4 id="action-prompt" style="color: var(--accent-blue); margin-top: 0;">請選擇目標</h4>
            <div id="special-options-container" class="special-options hidden"></div>
            <div id="player-targets-grid" class="players-grid"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                <button id="btn-confirm-action" class="btn-primary" disabled>確認</button>
                <button id="btn-cancel-action" class="btn-secondary hidden">取消</button>
            </div>
        </div>

        <div id="player-voting-panel" class="voting-panel hidden">
            <h4 style="color: var(--accent-red); margin-top: 0;">放逐投票</h4>
            <div id="voting-targets-grid" class="players-grid"></div>
            <button id="btn-abstain-vote" class="btn-secondary" style="margin-top: 15px;">棄票</button>
        </div>
    </div>
</div>

<script src="./js/config.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/library.js"></script>
<script src="./js/host.js"></script>
<script src="./js/player.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // 動態生成配置表單
    const setupGrid = document.getElementById('role-selection-grid');
    if (typeof ROLE_DICTIONARY !== 'undefined') {
        for (const [roleName, def] of Object.entries(ROLE_DICTIONARY)) {
            if (roleName.includes("狼人陣營-") || roleName.includes("幸運兒")) continue;
            
            const card = document.createElement('div');
            card.className = 'config-card';
            card.innerHTML = `
                <div style="font-size: 14px; font-weight: bold; margin-bottom: 5px;">${roleName}</div>
                <input type="number" id="qty-${roleName}" value="${roleName === '平民' || roleName === '狼人' ? '0' : '0'}" min="0">
            `;
            setupGrid.appendChild(card);
        }
    }

    // 綁定按鈕切換與初始化事件
    document.getElementById('btn-create-room')?.addEventListener('click', () => {
        const roomId = Math.floor(1000 + Math.random() * 9000).toString();
        document.getElementById('role-selection').classList.add('hidden');
        document.getElementById('host-screen').classList.remove('hidden');
        if (typeof initHost === 'function') initHost(roomId);
    });

    document.getElementById('btn-join-room')?.addEventListener('click', () => {
        const roomId = document.getElementById('input-room-id').value;
        const name = document.getElementById('input-player-name').value;
        if (!roomId || !name) return alert('請輸入完整資訊');
        document.getElementById('player-join-section').classList.add('hidden');
        document.getElementById('player-screen').classList.remove('hidden');
        if (typeof initPlayer === 'function') initPlayer(roomId, name);
    });

    // 綁定發牌事件
    document.getElementById('btn-start-game-logic')?.addEventListener('click', () => {
        let deck = [];
        for (const roleName in ROLE_DICTIONARY) {
            const input = document.getElementById(`qty-${roleName}`);
            if (input && parseInt(input.value) > 0) {
                for (let i = 0; i < parseInt(input.value); i++) {
                    deck.push(roleName);
                }
            }
        }
        
        if (deck.length === 0) return alert('請至少選擇一名角色！');
        
        if (typeof startGame === 'function') {
            startGame(deck); 
            document.getElementById('host-setup-panel').classList.add('hidden');
            document.getElementById('host-runtime-panel').classList.remove('hidden');
            document.getElementById('day-dashboard').classList.remove('hidden'); 
        }
    });
});
</script>
</body>
</html>
